<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StentorDeck</title>
    <style>
      :root {
        --bg: #0e1115;
        --tx: #f4f7fb;
        --dim: #aab4c2;
        --a: #ffb454;
        --b: #5bd0ff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--tx);
        font-family: Bahnschrift, 'Segoe UI', sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        padding: 1.5rem;
      }
      .mark {
        width: 72px;
        height: 72px;
        animation: rise 700ms ease-out both;
      }
      .name {
        font-size: 1.45rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        animation: rise 700ms ease-out 80ms both;
      }
      .for {
        margin-top: -0.55rem;
        font-size: 0.85rem;
        color: var(--dim);
        letter-spacing: 0.04em;
        animation: rise 700ms ease-out 140ms both;
      }
      .bar {
        width: 9rem;
        height: 0.2rem;
        margin-top: 0.65rem;
        border-radius: 999px;
        background: #262e39;
        overflow: hidden;
        animation: rise 700ms ease-out 200ms both;
      }
      .bar > i {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--a), var(--b));
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(280%);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg class="mark" viewBox="0 0 40 40" aria-hidden="true">
        <rect width="40" height="40" rx="8" fill="#0E1115" />
        <rect x="9" y="10" width="7" height="22" rx="2.5" fill="#FFB454" />
        <rect x="18" y="6" width="7" height="26" rx="2.5" fill="#5BD0FF" />
        <text
          x="31"
          y="30"
          text-anchor="middle"
          fill="#F4F7FB"
          font-family="Bahnschrift, Segoe UI, sans-serif"
          font-size="14"
          font-weight="600"
        >
          j
        </text>
      </svg>
      <div class="name">StentorDeck</div>
      <div class="for">for julius</div>
      <div class="bar" aria-hidden="true"><i></i></div>
    </div>
  </body>
</html>
